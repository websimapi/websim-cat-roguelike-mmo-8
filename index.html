<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cat Roguelike MMO</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        /* Forced Landscape Mode for Mobile Portrait */
        /* Only apply to devices with width < 760px (Phones), preventing Tablets from forcing rotation */
        @media screen and (orientation: portrait) and (max-width: 760px) {
            #game-container {
                position: absolute;
                top: 50%;
                left: 50%;
                width: 100vh; /* Swap width/height */
                height: 100vw;
                /* Rotate 90deg to force landscape view */
                transform: translate(-50%, -50%) rotate(90deg);
            }
        }

        canvas {
            image-rendering: pixelated;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            outline: none; /* Remove blue focus outline */
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2000;
        }
        #chat-box {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            max-width: 90%;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #fff;
            border-radius: 8px;
            padding: 15px;
            color: white;
            display: none;
            pointer-events: auto;
        }
        #npc-name {
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 5px;
        }
        #npc-text {
            font-size: 16px;
            line-height: 1.4;
        }
        .interaction-prompt {
            position: absolute;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 14px;
            pointer-events: none;
            display: none;
            z-index: 100;
        }
        #loading {
            position: absolute;
            color: white;
            font-size: 24px;
            z-index: 3000;
            pointer-events: none;
        }
        #joystick-zone {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            pointer-events: auto;
            z-index: 2001;
        }
        #close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: 2px solid white;
            border-radius: 50%;
            display: none; /* Hidden by default */
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 20px;
            cursor: pointer;
            z-index: 4000;
            pointer-events: auto;
            transition: opacity 0.5s;
        }
        #focus-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            display: none;
            z-index: 2500;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="bgCanvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none;"></canvas>
        <div id="loading">Tap to Start</div>
        <canvas id="gameCanvas" style="position: relative; z-index: 1; width: 100%; height: 100%;"></canvas>
        <div id="focus-overlay"></div>
        <div id="ui-layer">
            <div id="joystick-zone"></div>
            <div id="interaction-label" class="interaction-prompt">Press 'T' to Talk</div>
            <div id="chat-box">
                <div id="npc-name">Shopkeeper</div>
                <div id="npc-text">...</div>
            </div>
            <div id="close-btn">X</div>
        </div>
    </div>
    <script type="module" src="src/main.js"></script>

</body>
</html>
